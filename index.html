<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quiz – March 09, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
      color: #0a0a0a;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .header-left {}
    .header-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-date {
      font-size: 1.1rem;
      font-weight: 600;
      color: #888888;
    }
    .home-btn {
      display: none;
      padding: 8px 18px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .home-btn:hover { border-color: #0a0a0a; background: #f5f5f5; }
    .home-btn.visible { display: inline-block; }
    .progress-bar {
      height: 3px;
      background: #e8e8e8;
      border-radius: 999px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #00c87a;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── Source attribution ── */
    .source-tag {
      display: inline-block;
      font-size: 0.78rem;
      color: #999999;
      margin-bottom: 14px;
    }
    .source-tag span {
      font-style: italic;
    }

    /* ── Home screen ── */
    .home-screen {
      display: none;
    }
    .home-screen.show { display: block; }
    .home-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .home-subtitle {
      font-size: 0.95rem;
      color: #666666;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .path-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .path-card {
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 24px 28px;
      cursor: pointer;
      text-align: left;
      background: #ffffff;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .path-card:hover {
      border-color: #0a0a0a;
      background: #fafafa;
    }
    .path-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #0a0a0a;
    }
    .path-card-desc {
      font-size: 0.875rem;
      color: #666666;
      line-height: 1.55;
    }
    .path-card-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 3px 10px;
      margin-bottom: 10px;
    }
    .tag-quiz { background: #e6fff4; color: #007a4a; }
    .tag-facts { background: #f0f0ff; color: #4040cc; }

    /* ── Quiz ── */
    .quiz-screen { display: none; }
    .quiz-screen.show { display: block; }
    .question {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
      color: #0a0a0a;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      text-align: left;
      padding: 16px 22px;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0a0a0a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) { background: #f5f5f5; }
    .option-btn.correct {
      border-color: #00c87a;
      background: #e6fff4;
      color: #007a4a;
    }
    .option-btn.wrong {
      border-color: #ff4d4d;
      background: #fff0f0;
      color: #cc0000;
    }
    .option-btn:disabled { cursor: default; }
    .explanation {
      display: none;
      border-left: 3px solid #e8e8e8;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #666666;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .explanation.show { display: block; }

    /* ── Score screen ── */
    .score-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .score-screen.show { display: block; }
    .score-big {
      font-size: 5rem;
      font-weight: 700;
      color: #0a0a0a;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 1rem;
      color: #999999;
      margin-bottom: 24px;
    }
    .score-msg {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0a0a0a;
      margin-bottom: 40px;
    }

    /* ── Facts screen ── */
    .facts-screen { display: none; }
    .facts-screen.show { display: block; }
    .fact-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .fact-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      color: #0a0a0a;
    }
    .fact-body {
      font-size: 1rem;
      color: #444444;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* ── Facts done screen ── */
    .facts-done-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .facts-done-screen.show { display: block; }
    .facts-done-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .facts-done-msg {
      font-size: 1rem;
      color: #666666;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Shared buttons ── */
    .btn-primary {
      display: inline-block;
      padding: 14px 32px;
      background: #0a0a0a;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.82; }
    .btn-outline {
      display: inline-block;
      padding: 14px 32px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #0a0a0a;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-outline:hover { background: #0a0a0a; color: #ffffff; }
    .btn-hidden { display: none; }
    .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-left">
      <div class="header-label">Daily Learning</div>
      <div class="header-date">March 09, 2026</div>
    </div>
    <button class="home-btn" id="home-btn" onclick="showHome()">← Home</button>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Home screen -->
  <div class="home-screen show" id="home-screen">
    <div class="home-title">Daily Insights from Hyder's Favourite Reads</div>
    <div class="home-subtitle">
      Every book I read, I take notes. This is where those notes come to life — a daily quiz or a fresh insight, refreshed every morning.
    </div>
    <div class="path-cards">
      <button class="path-card" onclick="startQuiz()">
        <div class="path-card-tag tag-quiz">Quiz</div>
        <div class="path-card-title">Test your knowledge</div>
        <div class="path-card-desc">5 multiple-choice questions on ideas from your books. See how much stuck — answers and explanations included.</div>
      </button>
      <button class="path-card" onclick="startFacts()">
        <div class="path-card-tag tag-facts">Interesting Facts</div>
        <div class="path-card-title">Just learn something new</div>
        <div class="path-card-desc">5 surprising or thought-provoking ideas pulled from today's reading. No right or wrong — just things worth knowing.</div>
      </button>
    </div>
  </div>

  <!-- Quiz screen -->
  <div class="quiz-screen" id="quiz-screen">
    <div class="source-tag" id="quiz-source"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <div class="btn-row">
      <button class="btn-primary btn-hidden" id="next-btn">Next question →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div class="score-screen" id="score-screen">
    <div class="score-big" id="score-value"></div>
    <div class="score-label">out of 5</div>
    <div class="score-msg" id="score-msg"></div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startQuiz()">Try again</button>
    </div>
  </div>

  <!-- Facts screen -->
  <div class="facts-screen" id="facts-screen">
    <div class="fact-number" id="fact-number"></div>
    <div class="fact-title" id="fact-title"></div>
    <div class="fact-body" id="fact-body"></div>
    <div class="source-tag" id="fact-source"></div>
    <div class="btn-row">
      <button class="btn-primary" id="fact-next-btn">Next fact →</button>
    </div>
  </div>

  <!-- Facts done screen -->
  <div class="facts-done-screen" id="facts-done-screen">
    <div class="facts-done-title">That's a wrap.</div>
    <div class="facts-done-msg">5 ideas from today's reading. Come back tomorrow for more.</div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startFacts()">Read again</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "What was Saladin's given first name?", "options": ["Saladin", "Yousuf", "Zangi", "Nizar"], "answer": 1, "explanation": "According to the note, Saladin's name was Yousuf (also spelled Yusuf). 'Saladin' was the name by which he became historically known in the Western world.", "book": "Saladin", "author": "Unknown"}, {"question": "What pivotal but ultimately failed Apple product was credited with opening up Apple's relationship with Taiwan?", "options": ["The iMac", "The LaserWriter", "The Newton", "The Apple 2"], "answer": 2, "explanation": "According to the note, the Newton — despite being a failure — was pivotal for Apple opening up Taiwan and also led to the hiring of Jony Ive.", "book": "Apple in China", "author": "Unknown"}, {"question": "According to the note on poverty in America, how is the poverty line defined?", "options": ["Earning less than the federal minimum wage", "Living in a household without running water or a flushing toilet", "When over a third of household income is spent on food necessities", "Having an income below half the national median"], "answer": 2, "explanation": "The note explicitly defines the poverty line as the point at which over a third of a household's income is spent on food necessities.", "book": "Poverty in America", "author": "Unknown"}, {"question": "In 'A Visit from the Goon Squad,' what does the title's reference to a 'goon' symbolize?", "options": ["The violent world of the music industry", "The inevitability of time passing and growing older", "A criminal figure who haunts the characters", "The exploitation of artists by record labels"], "answer": 1, "explanation": "The note explains that 'goon' refers to time — the inevitability of getting older, like being attacked by the passing of time. The book's structure reinforces this, beginning with a young Sasha and ending with another young woman living in her old apartment.", "book": "A Visit from the Goon Squad", "author": "Jennifer Egan"}, {"question": "In 'A Gentleman in Moscow,' why does Count Rostov ask to be clean shaven after his encounter at the barbershop?", "options": ["He was ordered by Bolshevik authorities to remove his aristocratic moustache", "He wanted to disguise himself to move freely through the hotel", "After deep self-reflection in a mirror, he decided to shed his old image", "His moustache was accidentally ruined by a hostile customer"], "answer": 2, "explanation": "The note describes how, after an awkward encounter with a hostile customer who cut his moustache and deep self-aware reflection upon seeing himself in a mirror — noting that mirrors reflect how we imagine ourselves rather than who we truly are — the Count asks to be clean shaven.", "book": "A Gentleman in Moscow", "author": "Amor Towles"}];
const FACTS = [{"title": "Resistance Through Small Luxuries", "fact": "After being stripped of his aristocratic life and confined to a tiny room in the Hotel Metropol, Count Rostov's quiet form of defiance was to maintain his old routines — using gold coins hidden in a secret panel in his inherited desk to buy small comforts like fine soap and comfortable pillows. Rather than mourning what was lost, he preserved dignity through deliberate, modest pleasure.", "book": "A Gentleman in Moscow", "author": "Amor Towles"}, {"title": "Thor Was Actually Ginger", "fact": "Contrary to his popular silver-screen portrayal as a blond god, Thor in Norse mythology was a redhead. He also couldn't wield his legendary hammer Mjolnir bare-handed — he required iron gloves to grip it — and its famously short handle was the result of Loki sabotaging its forging by turning into a fly and biting the dwarf craftsman mid-creation.", "book": "Norse Mythology", "author": "Neil Gaiman"}, {"title": "A Book Predicted War Was Impossible", "fact": "Just before World War One erupted, a widely read book called 'The Great Illusion' argued that modern war had become economically irrational — that even the victor would suffer devastating losses — and therefore large-scale conflict between industrialized nations was effectively obsolete. The war that followed almost immediately made it one of history's most tragically mistimed bestsellers.", "book": "The Guns of August", "author": "Barbara Tuchman"}, {"title": "The Milky Way From Hera's Milk", "fact": "According to Greek myth, the origin of the Milky Way traces back to a divine deception: Zeus secretly had the infant Heracles — his illegitimate son — latch onto the sleeping goddess Hera to nurse from her, knowing her divine milk would grant him immortality. When Hera woke and pulled away, the spurting breast milk scattered across the sky, forming the Milky Way.", "book": "Heroes", "author": "Stephen Fry"}, {"title": "Defeating Carthage Broke Rome", "fact": "Rome's final destruction of Carthage in 146 BC, rather than cementing its strength, paradoxically triggered its internal unraveling. With its greatest external enemy gone, Rome lost the unifying pressure that had kept its political system in check, and the following decades saw explosive economic inequality, political polarization, and rampant corruption — the very conditions that would eventually destroy the Republic.", "book": "The Storm Before the Storm", "author": "Mike Duncan"}];

let current = 0;
let score = 0;

function hide(id) { document.getElementById(id).classList.remove("show"); }
function show(id) { document.getElementById(id).classList.add("show"); }

function showHome() {
  hide("quiz-screen");
  hide("score-screen");
  hide("facts-screen");
  hide("facts-done-screen");
  document.getElementById("progress-fill").style.width = "0%";
  document.getElementById("home-btn").classList.remove("visible");
  show("home-screen");
}

// ── Quiz ──

function startQuiz() {
  current = 0;
  score = 0;
  hide("home-screen");
  hide("score-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("quiz-screen");
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / QUESTIONS.length) * 100}%`;
  document.getElementById("quiz-source").innerHTML =
    `<span>${q.book}</span> &mdash; ${q.author}`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("explanation").textContent = "";
  document.getElementById("explanation").classList.remove("show");
  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.add("btn-hidden");

  const container = document.getElementById("options-container");
  container.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);
  if (chosen === q.answer) {
    buttons[chosen].classList.add("correct");
    score++;
  } else {
    buttons[chosen].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }
  const expEl = document.getElementById("explanation");
  expEl.textContent = q.explanation;
  expEl.classList.add("show");
  document.getElementById("next-btn").classList.remove("btn-hidden");
}

document.getElementById("next-btn").addEventListener("click", () => {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    hide("quiz-screen");
    show("score-screen");
    document.getElementById("score-value").textContent = score;
    const msgs = [
      "Keep reading — you'll get there!",
      "Not bad, keep going!",
      "Good effort!",
      "Well done!",
      "Almost perfect!",
      "Perfect score! Outstanding!"
    ];
    document.getElementById("score-msg").textContent = msgs[score];
  }
});

// ── Facts ──

function startFacts() {
  current = 0;
  hide("home-screen");
  hide("facts-done-screen");
  document.getElementById("home-btn").classList.add("visible");
  show("facts-screen");
  showFact();
}

function showFact() {
  const f = FACTS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / FACTS.length) * 100}%`;
  document.getElementById("fact-number").textContent =
    `Fact ${current + 1} of ${FACTS.length}`;
  document.getElementById("fact-title").textContent = f.title;
  document.getElementById("fact-body").textContent = f.fact;
  document.getElementById("fact-source").innerHTML =
    `<span>${f.book}</span> &mdash; ${f.author}`;
  document.getElementById("fact-next-btn").textContent =
    current < FACTS.length - 1 ? "Next fact →" : "Finish";
}

document.getElementById("fact-next-btn").addEventListener("click", () => {
  current++;
  if (current < FACTS.length) {
    showFact();
  } else {
    hide("facts-screen");
    document.getElementById("progress-fill").style.width = "100%";
    show("facts-done-screen");
  }
});
</script>
</body>
</html>
