<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quiz – March 09, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a202c;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 680px;
      width: 100%;
      padding: 40px 36px;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #718096;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .progress {
      font-size: 0.9rem;
      color: #a0aec0;
      margin-bottom: 28px;
    }
    .progress-bar {
      height: 4px;
      background: #e2e8f0;
      border-radius: 99px;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #667eea;
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .question {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }
    .option-btn {
      text-align: left;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      background: white;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) {
      border-color: #667eea;
      background: #f7f8ff;
    }
    .option-btn.correct {
      border-color: #38a169;
      background: #f0fff4;
      color: #276749;
    }
    .option-btn.wrong {
      border-color: #e53e3e;
      background: #fff5f5;
      color: #9b2c2c;
    }
    .option-btn:disabled { cursor: default; }
    .explanation {
      display: none;
      background: #ebf8ff;
      border-left: 4px solid #4299e1;
      padding: 14px 16px;
      border-radius: 0 8px 8px 0;
      font-size: 0.95rem;
      color: #2b6cb0;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .explanation.show { display: block; }
    .next-btn {
      display: none;
      padding: 12px 28px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .next-btn:hover { background: #5a67d8; }
    .next-btn.show { display: inline-block; }
    /* Score screen */
    .score-screen {
      display: none;
      text-align: center;
    }
    .score-screen.show { display: block; }
    .score-big {
      font-size: 5rem;
      font-weight: 700;
      color: #667eea;
      margin: 16px 0 8px;
    }
    .score-label {
      font-size: 1.1rem;
      color: #718096;
      margin-bottom: 32px;
    }
    .score-msg {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 32px;
    }
    .restart-btn {
      padding: 12px 28px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .restart-btn:hover { background: #5a67d8; }
    .quiz-body { display: block; }
  </style>
</head>
<body>
<div class="card">
  <h1>Daily Quiz</h1>
  <div class="progress" id="progress-text">Question 1 of 5</div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:20%"></div></div>

  <div class="quiz-body" id="quiz-body">
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="next-btn">Next question →</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div style="font-size:3rem;">🎉</div>
    <div class="score-big" id="score-value"></div>
    <div class="score-label">out of 5</div>
    <div class="score-msg" id="score-msg"></div>
    <button class="restart-btn" onclick="startQuiz()">Try again</button>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "What keyboard shortcut is used to switch between modes (such as plan mode) in Claude Code?", "options": ["Cmd+B", "Esc pressed twice", "Up arrow", "Shift+Tab"], "answer": 3, "explanation": "Shift+Tab is the shortcut used to toggle between different modes, including plan mode, in Claude Code."}, {"question": "According to the AI PM notes, what is the recommended approach when Marketing or Sales come to you with a solution?", "options": ["Accept the solution and add it to the roadmap immediately", "Reverse engineer their suggestion to identify the underlying problem it solves", "Outsource the thinking to an AI tool to evaluate the solution", "Focus on the technical feasibility of implementing the solution"], "answer": 1, "explanation": "The notes emphasize asking 'why do you think that's helpful / what problem will it solve' — the goal is to reverse engineer the suggested solution back to the underlying problem, which can then be validated and added to the opportunity tree."}, {"question": "In the context of Continuous Discovery, what is the key distinction between 'discovery' and 'delivery'?", "options": ["Discovery is done by engineers, delivery is done by designers", "Discovery is deciding what to build, delivery is building and shipping it", "Discovery focuses on metrics, delivery focuses on customer feedback", "Discovery happens after launch, delivery happens before"], "answer": 1, "explanation": "The notes define discovery as 'the work you do to decide what to build' and delivery as 'the work you do to build and ship products,' noting that most companies underinvest in discovery."}, {"question": "According to the AI PM notes, what should a Product Manager focus on most, especially early in the solution space?", "options": ["Feasibility and usability", "Feasability and viability", "Value and viability", "Usability and feasibility"], "answer": 2, "explanation": "The notes explicitly state that as a PM, especially early on, you should focus on whether a solution is 'valuable and viable' — and not on whether it is technically feasible."}, {"question": "In Python, what does the type() function do?", "options": ["It deletes a variable from memory", "It converts a variable to a string", "It returns the data type of a variable, such as string, integer, or float", "It creates a new variable with a specified type"], "answer": 2, "explanation": "The notes explain that type(name) 'gives you the name of your variable,' meaning it returns the data type — for example, whether the variable is a string, integer, or float."}];

let current = 0;
let score = 0;

function startQuiz() {
  current = 0;
  score = 0;
  document.getElementById("score-screen").classList.remove("show");
  document.getElementById("quiz-body").style.display = "block";
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("progress-text").textContent =
    `Question ${current + 1} of ${QUESTIONS.length}`;
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / QUESTIONS.length) * 100}%`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("explanation").textContent = "";
  document.getElementById("explanation").classList.remove("show");
  document.getElementById("next-btn").classList.remove("show");

  const container = document.getElementById("options-container");
  container.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);

  if (chosen === q.answer) {
    buttons[chosen].classList.add("correct");
    score++;
  } else {
    buttons[chosen].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }

  const expEl = document.getElementById("explanation");
  expEl.textContent = q.explanation;
  expEl.classList.add("show");
  document.getElementById("next-btn").classList.add("show");
}

document.getElementById("next-btn").addEventListener("click", () => {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    showScore();
  }
});

function showScore() {
  document.getElementById("quiz-body").style.display = "none";
  const ss = document.getElementById("score-screen");
  ss.classList.add("show");
  document.getElementById("score-value").textContent = score;
  const msgs = [
    "Keep reading — you'll get there!",
    "Not bad, keep going!",
    "Good effort!",
    "Well done!",
    "Almost perfect!",
    "Perfect score! Outstanding!"
  ];
  document.getElementById("score-msg").textContent = msgs[score];
}

startQuiz();
</script>
</body>
</html>
