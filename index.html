<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quiz – March 09, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
      color: #0a0a0a;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .header {
      margin-bottom: 32px;
    }
    .header-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-date {
      font-size: 0.85rem;
      color: #bbbbbb;
    }
    .progress-bar {
      height: 3px;
      background: #e8e8e8;
      border-radius: 999px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #00c87a;
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .question {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
      color: #0a0a0a;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      text-align: left;
      padding: 16px 22px;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0a0a0a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) {
      background: #f5f5f5;
    }
    .option-btn.correct {
      border-color: #00c87a;
      background: #e6fff4;
      color: #007a4a;
    }
    .option-btn.wrong {
      border-color: #ff4d4d;
      background: #fff0f0;
      color: #cc0000;
    }
    .option-btn:disabled { cursor: default; }
    .explanation {
      display: none;
      border-left: 3px solid #e8e8e8;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #666666;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .explanation.show { display: block; }
    .next-btn {
      display: none;
      padding: 14px 32px;
      background: #0a0a0a;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .next-btn:hover { opacity: 0.82; }
    .next-btn.show { display: inline-block; }
    .score-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .score-screen.show { display: block; }
    .score-big {
      font-size: 5rem;
      font-weight: 700;
      color: #0a0a0a;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 1rem;
      color: #999999;
      margin-bottom: 24px;
    }
    .score-msg {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0a0a0a;
      margin-bottom: 40px;
    }
    .restart-btn {
      padding: 14px 32px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #0a0a0a;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .restart-btn:hover {
      background: #0a0a0a;
      color: #ffffff;
    }
    .quiz-body { display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-label">Daily Quiz</div>
    <div class="header-date">March 09, 2026</div>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:20%"></div></div>

  <div class="quiz-body" id="quiz-body">
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="next-btn">Next question →</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div class="score-big" id="score-value"></div>
    <div class="score-label">out of 5</div>
    <div class="score-msg" id="score-msg"></div>
    <button class="restart-btn" onclick="startQuiz()">Try again</button>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "What keyboard shortcut is used to switch between modes (such as plan mode) in Claude Code?", "options": ["Cmd+B", "Up Arrow", "Shift+Tab", "Esc pressed twice"], "answer": 2, "explanation": "Shift+Tab is used to switch between modes in Claude Code, including toggling plan mode."}, {"question": "According to the notes on AI Product Management, what should a PM do when Marketing or Sales comes to them with a solution?", "options": ["Immediately add it to the product roadmap", "Reverse engineer the suggested solution back to the underlying problem by asking why it would be helpful", "Evaluate whether it is technically feasible before anything else", "Outsource the thinking to an AI tool to generate a PRD"], "answer": 1, "explanation": "The notes emphasize asking 'why do you think that's helpful / what problem will it solve' to reverse engineer solutions back to real problems, which is what gets added to the opportunity tree."}, {"question": "In Python (as covered in the notes), what does the type() function do?", "options": ["Deletes a cell in Jupyter Lab", "Runs a command in the terminal", "Returns the data type of a variable, such as string, integer, or float", "Creates a new variable in memory"], "answer": 2, "explanation": "The type() function returns the type of a variable — for example, whether it is a string, integer, or float (decimal)."}, {"question": "According to the Continuous Discovery notes, what is the core distinction between 'discovery' and 'delivery'?", "options": ["Discovery is done by engineers; delivery is done by designers", "Discovery is the work you do to decide what to build; delivery is the work you do to build and ship products", "Discovery focuses on business outcomes; delivery focuses on customer outcomes", "Discovery happens after launch; delivery happens before launch"], "answer": 1, "explanation": "The notes clearly define discovery as the work done to decide what to build, and delivery as the work done to actually build and ship those products. Most companies underinvest in discovery."}, {"question": "When evaluating solutions in the execution/solution space, what should a PM — especially early on — primarily focus on?", "options": ["Feasibility and usability", "Usability and feasibility", "Valuable and viable", "Feasible and usable"], "answer": 2, "explanation": "The notes explicitly state that as a PM, especially early on, you should focus on whether a solution is valuable and viable, and not get distracted by whether it is technically feasible."}];

let current = 0;
let score = 0;

function startQuiz() {
  current = 0;
  score = 0;
  document.getElementById("score-screen").classList.remove("show");
  document.getElementById("quiz-body").style.display = "block";
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / QUESTIONS.length) * 100}%`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("explanation").textContent = "";
  document.getElementById("explanation").classList.remove("show");
  document.getElementById("next-btn").classList.remove("show");

  const container = document.getElementById("options-container");
  container.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);

  if (chosen === q.answer) {
    buttons[chosen].classList.add("correct");
    score++;
  } else {
    buttons[chosen].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }

  const expEl = document.getElementById("explanation");
  expEl.textContent = q.explanation;
  expEl.classList.add("show");
  document.getElementById("next-btn").classList.add("show");
}

document.getElementById("next-btn").addEventListener("click", () => {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    showScore();
  }
});

function showScore() {
  document.getElementById("quiz-body").style.display = "none";
  const ss = document.getElementById("score-screen");
  ss.classList.add("show");
  document.getElementById("score-value").textContent = score;
  const msgs = [
    "Keep reading — you'll get there!",
    "Not bad, keep going!",
    "Good effort!",
    "Well done!",
    "Almost perfect!",
    "Perfect score! Outstanding!"
  ];
  document.getElementById("score-msg").textContent = msgs[score];
}

startQuiz();
</script>
</body>
</html>
