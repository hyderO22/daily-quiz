<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quiz – March 09, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
      color: #0a0a0a;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .header {
      margin-bottom: 32px;
    }
    .header-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-date {
      font-size: 1.1rem;
      font-weight: 600;
      color: #888888;
    }
    .progress-bar {
      height: 3px;
      background: #e8e8e8;
      border-radius: 999px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #00c87a;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── Source attribution ── */
    .source-tag {
      display: inline-block;
      font-size: 0.78rem;
      color: #999999;
      margin-bottom: 14px;
    }
    .source-tag span {
      font-style: italic;
    }

    /* ── Home screen ── */
    .home-screen {
      display: none;
    }
    .home-screen.show { display: block; }
    .home-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .home-subtitle {
      font-size: 0.95rem;
      color: #666666;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .path-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .path-card {
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 24px 28px;
      cursor: pointer;
      text-align: left;
      background: #ffffff;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .path-card:hover {
      border-color: #0a0a0a;
      background: #fafafa;
    }
    .path-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #0a0a0a;
    }
    .path-card-desc {
      font-size: 0.875rem;
      color: #666666;
      line-height: 1.55;
    }
    .path-card-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 3px 10px;
      margin-bottom: 10px;
    }
    .tag-quiz { background: #e6fff4; color: #007a4a; }
    .tag-facts { background: #f0f0ff; color: #4040cc; }

    /* ── Quiz ── */
    .quiz-screen { display: none; }
    .quiz-screen.show { display: block; }
    .question {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
      color: #0a0a0a;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }
    .option-btn {
      text-align: left;
      padding: 16px 22px;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      background: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0a0a0a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.45;
    }
    .option-btn:hover:not(:disabled) { background: #f5f5f5; }
    .option-btn.correct {
      border-color: #00c87a;
      background: #e6fff4;
      color: #007a4a;
    }
    .option-btn.wrong {
      border-color: #ff4d4d;
      background: #fff0f0;
      color: #cc0000;
    }
    .option-btn:disabled { cursor: default; }
    .explanation {
      display: none;
      border-left: 3px solid #e8e8e8;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #666666;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .explanation.show { display: block; }

    /* ── Score screen ── */
    .score-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .score-screen.show { display: block; }
    .score-big {
      font-size: 5rem;
      font-weight: 700;
      color: #0a0a0a;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 1rem;
      color: #999999;
      margin-bottom: 24px;
    }
    .score-msg {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0a0a0a;
      margin-bottom: 40px;
    }

    /* ── Facts screen ── */
    .facts-screen { display: none; }
    .facts-screen.show { display: block; }
    .fact-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .fact-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      color: #0a0a0a;
    }
    .fact-body {
      font-size: 1rem;
      color: #444444;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* ── Facts done screen ── */
    .facts-done-screen {
      display: none;
      text-align: center;
      padding-top: 24px;
    }
    .facts-done-screen.show { display: block; }
    .facts-done-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .facts-done-msg {
      font-size: 1rem;
      color: #666666;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Shared buttons ── */
    .btn-primary {
      display: inline-block;
      padding: 14px 32px;
      background: #0a0a0a;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.82; }
    .btn-outline {
      display: inline-block;
      padding: 14px 32px;
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid #0a0a0a;
      border-radius: 999px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-outline:hover { background: #0a0a0a; color: #ffffff; }
    .btn-hidden { display: none; }
    .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-label">Daily Learning</div>
    <div class="header-date">March 09, 2026</div>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Home screen -->
  <div class="home-screen show" id="home-screen">
    <div class="home-title">Daily Insights from Hyder's Favourite Reads</div>
    <div class="home-subtitle">
      Every book I read, I take notes. This is where those notes come to life — a daily quiz or a fresh insight, refreshed every morning.
    </div>
    <div class="path-cards">
      <button class="path-card" onclick="startQuiz()">
        <div class="path-card-tag tag-quiz">Quiz</div>
        <div class="path-card-title">Test your knowledge</div>
        <div class="path-card-desc">5 multiple-choice questions on ideas from your books. See how much stuck — answers and explanations included.</div>
      </button>
      <button class="path-card" onclick="startFacts()">
        <div class="path-card-tag tag-facts">Interesting Facts</div>
        <div class="path-card-title">Just learn something new</div>
        <div class="path-card-desc">5 surprising or thought-provoking ideas pulled from today's reading. No right or wrong — just things worth knowing.</div>
      </button>
    </div>
  </div>

  <!-- Quiz screen -->
  <div class="quiz-screen" id="quiz-screen">
    <div class="source-tag" id="quiz-source"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <div class="btn-row">
      <button class="btn-primary btn-hidden" id="next-btn">Next question →</button>
    </div>
  </div>

  <!-- Score screen -->
  <div class="score-screen" id="score-screen">
    <div class="score-big" id="score-value"></div>
    <div class="score-label">out of 5</div>
    <div class="score-msg" id="score-msg"></div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startQuiz()">Try again</button>
    </div>
  </div>

  <!-- Facts screen -->
  <div class="facts-screen" id="facts-screen">
    <div class="fact-number" id="fact-number"></div>
    <div class="fact-title" id="fact-title"></div>
    <div class="fact-body" id="fact-body"></div>
    <div class="source-tag" id="fact-source"></div>
    <div class="btn-row">
      <button class="btn-primary" id="fact-next-btn">Next fact →</button>
    </div>
  </div>

  <!-- Facts done screen -->
  <div class="facts-done-screen" id="facts-done-screen">
    <div class="facts-done-title">That's a wrap.</div>
    <div class="facts-done-msg">5 ideas from today's reading. Come back tomorrow for more.</div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn-outline" onclick="showHome()">Back to home</button>
      <button class="btn-outline" onclick="startFacts()">Read again</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [{"question": "What was a key reason IBM came to dominate Apple in the early personal computing era?", "options": ["IBM had better hardware design and aesthetics", "IBM's more open model allowed Microsoft to license its OS to other manufacturers, enabling greater competition", "IBM had a larger marketing budget and global retail presence", "IBM acquired Apple's key suppliers, cutting off their component access"], "answer": 1, "explanation": "IBM partnered with Microsoft and crucially allowed Microsoft to license its OS to third parties, creating a more open and competitive ecosystem. Jobs miscalculated by prioritizing a closed 'better experience' model over openness.", "book": "Apple in China (part I)", "author": "Unknown"}, {"question": "What role did the Newton play in Apple's manufacturing history, despite being a commercial failure?", "options": ["It introduced Apple to LG as a key manufacturing partner", "It was the first product assembled entirely in China", "It was pivotal in opening up Apple's relationship with Taiwan and contributed to hiring Jony Ive", "It led directly to the outsourcing deal with Foxconn"], "answer": 2, "explanation": "Despite being a failed product, the Newton was significant because it helped Apple establish its manufacturing relationship with Taiwan and was connected to the hiring of Jony Ive.", "book": "Apple in China (part I)", "author": "Unknown"}, {"question": "Why did the third generation iPod become a massive commercial success compared to the first two generations?", "options": ["It was the first iPod to feature a touchscreen interface", "Apple reduced the price and expanded compatibility to Windows users, driving over 200% sales growth", "Apple launched an aggressive global advertising campaign targeting teenagers", "It included built-in wireless connectivity for the first time"], "answer": 1, "explanation": "The first two iPod generations were limited by high price and Mac-only compatibility. After Jobs relented and allowed iTunes and the iPod to work with Windows, the third generation saw over 200% growth in sales.", "book": "Apple in China (part I)", "author": "Unknown"}, {"question": "What distinguished Foxconn's business model as an OEM compared to companies like Asus and Acer?", "options": ["Foxconn designed its own consumer products and sold them under its own brand", "Foxconn focused exclusively on software development for Western companies", "Foxconn built products using other companies' designs, while Asus and Acer evolved from ODMs into their own consumer brands", "Foxconn specialized only in semiconductor manufacturing, not assembly"], "answer": 2, "explanation": "Foxconn operated as an OEM, manufacturing products based on clients' designs. In contrast, Asus and Acer started as ODMs but eventually developed and shipped products under their own brand names.", "book": "Apple in China (part I)", "author": "Unknown"}, {"question": "How did Deng Xiaoping begin China's transition from an isolated economy to a global manufacturing hub?", "options": ["He signed a free trade agreement directly with the United States in 1975", "He privatized all state-owned enterprises and eliminated the Communist Party's economic role", "He established experimental commercial zones that opened China to foreign investment after Mao's failed policies", "He invited Taiwanese companies to relocate their factories to Beijing"], "answer": 2, "explanation": "After Mao Zedong's Great Leap Forward and Cultural Revolution left China impoverished, Deng Xiaoping opened the country by creating experimental commercial zones, beginning China's integration into the global economy.", "book": "Apple in China (part I)", "author": "Unknown"}];
const FACTS = [{"title": "Foxconn Outearns Meta and Nvidia", "fact": "Foxconn, the Taiwanese manufacturer best known for assembling iPhones, generates more revenue than Meta and Nvidia combined. Despite being largely invisible to consumers, it is one of the most consequential companies in the global economy.", "book": "Apple in China", "author": "Unknown (notes source)"}, {"title": "Plastic Born From Billiards", "fact": "The invention of plastic injection moulding was triggered by a shortage of ivory caused by the rising popularity of billiards. A prize was offered in 1872 to create an ivory substitute, inadvertently launching an entire materials revolution.", "book": "Apple in China", "author": "Unknown (notes source)"}, {"title": "IBM Gave Away Its OS", "fact": "When IBM entered the personal computer market, it outsourced nearly everything — including its operating system — to Microsoft, and crucially allowed Microsoft to license that OS to other companies. This single decision handed Microsoft dominance of the PC industry and ultimately undermined IBM's own position.", "book": "Apple in China", "author": "Unknown (notes source)"}, {"title": "China Built by Outsourcing Knowledge", "fact": "Apple didn't simply hand off manufacturing to China — it micromanaged suppliers, transferred deep technical knowledge, and even purchased custom equipment it barred suppliers from using for rivals. In doing so, Apple inadvertently built up China's technological competence over decades.", "book": "Apple in China", "author": "Unknown (notes source)"}, {"title": "Newton's Failure Opened New Doors", "fact": "Apple's Newton — widely remembered as a commercial failure — was actually pivotal in establishing Apple's manufacturing relationships in Taiwan and was part of the chain of events that led to hiring designer Jony Ive. Sometimes a product's most important legacy is not what it sold, but what it set in motion.", "book": "Apple in China", "author": "Unknown (notes source)"}];

let current = 0;
let score = 0;

function hide(id) { document.getElementById(id).classList.remove("show"); }
function show(id) { document.getElementById(id).classList.add("show"); }

function showHome() {
  hide("quiz-screen");
  hide("score-screen");
  hide("facts-screen");
  hide("facts-done-screen");
  document.getElementById("progress-fill").style.width = "0%";
  show("home-screen");
}

// ── Quiz ──

function startQuiz() {
  current = 0;
  score = 0;
  hide("home-screen");
  hide("score-screen");
  show("quiz-screen");
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / QUESTIONS.length) * 100}%`;
  document.getElementById("quiz-source").innerHTML =
    `<span>${q.book}</span> &mdash; ${q.author}`;
  document.getElementById("question-text").textContent = q.question;
  document.getElementById("explanation").textContent = "";
  document.getElementById("explanation").classList.remove("show");
  const nextBtn = document.getElementById("next-btn");
  nextBtn.classList.add("btn-hidden");

  const container = document.getElementById("options-container");
  container.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);
  if (chosen === q.answer) {
    buttons[chosen].classList.add("correct");
    score++;
  } else {
    buttons[chosen].classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }
  const expEl = document.getElementById("explanation");
  expEl.textContent = q.explanation;
  expEl.classList.add("show");
  document.getElementById("next-btn").classList.remove("btn-hidden");
}

document.getElementById("next-btn").addEventListener("click", () => {
  current++;
  if (current < QUESTIONS.length) {
    showQuestion();
  } else {
    hide("quiz-screen");
    show("score-screen");
    document.getElementById("score-value").textContent = score;
    const msgs = [
      "Keep reading — you'll get there!",
      "Not bad, keep going!",
      "Good effort!",
      "Well done!",
      "Almost perfect!",
      "Perfect score! Outstanding!"
    ];
    document.getElementById("score-msg").textContent = msgs[score];
  }
});

// ── Facts ──

function startFacts() {
  current = 0;
  hide("home-screen");
  hide("facts-done-screen");
  show("facts-screen");
  showFact();
}

function showFact() {
  const f = FACTS[current];
  document.getElementById("progress-fill").style.width =
    `${((current + 1) / FACTS.length) * 100}%`;
  document.getElementById("fact-number").textContent =
    `Fact ${current + 1} of ${FACTS.length}`;
  document.getElementById("fact-title").textContent = f.title;
  document.getElementById("fact-body").textContent = f.fact;
  document.getElementById("fact-source").innerHTML =
    `<span>${f.book}</span> &mdash; ${f.author}`;
  document.getElementById("fact-next-btn").textContent =
    current < FACTS.length - 1 ? "Next fact →" : "Finish";
}

document.getElementById("fact-next-btn").addEventListener("click", () => {
  current++;
  if (current < FACTS.length) {
    showFact();
  } else {
    hide("facts-screen");
    document.getElementById("progress-fill").style.width = "100%";
    show("facts-done-screen");
  }
});
</script>
</body>
</html>
